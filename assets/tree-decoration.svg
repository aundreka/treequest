<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" shape-rendering="crispEdges">
  <!-- Trunk -->
  <g fill="#A05A2C">
    <rect x="34" y="80" width="12" height="40"/>
  </g>
  <g fill="#7A3F18">
    <rect x="34" y="80" width="2" height="40"/>
    <rect x="44" y="80" width="2" height="40"/>
    <rect x="36" y="92" width="2" height="6"/>
  </g>
  <!-- Canopy (chunky pixel leaves) -->
  <g fill="#00A800">
    <rect x="20" y="40" width="40" height="40"/>
    <rect x="12" y="48" width="56" height="24"/>
    <rect x="28" y="32" width="24" height="8"/>
    <rect x="16" y="36" width="8"  height="8"/>
    <rect x="56" y="36" width="8"  height="8"/>
    <rect x="8"  y="56" width="8"  height="8"/>
    <rect x="64" y="56" width="8"  height="8"/>
  </g>
  <!-- Highlights -->
  <g fill="#3CBC3C">
    <rect x="24" y="44" width="8" height="4"/>
    <rect x="40" y="52" width="6" height="4"/>
    <rect x="48" y="40" width="4" height="4"/>
  </g>
  <!-- Shadows -->
  <g fill="#007800">
    <rect x="20" y="72" width="40" height="8"/>
    <rect x="12" y="64" width="8"  height="8"/>
    <rect x="60" y="64" width="8"  height="8"/>
  </g>
  <!-- Outline -->
  <g fill="#000000">
    <rect x="34" y="120" width="12" height="0"/>
  </g>
</svg>
