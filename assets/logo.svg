<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" shape-rendering="crispEdges">
  <!-- Drop shadow -->
  <g fill="#000000" opacity="0.6">
    <rect x="6" y="22" width="308" height="56"/>
  </g>
  <!-- Background block -->
  <g fill="#E03C28">
    <rect x="4" y="20" width="308" height="56"/>
  </g>
  <!-- Inner highlight -->
  <g fill="#FCBC3C">
    <rect x="4" y="20" width="308" height="4"/>
    <rect x="4" y="20" width="4"   height="56"/>
  </g>
  <g fill="#A02020">
    <rect x="4"   y="72" width="308" height="4"/>
    <rect x="308" y="20" width="4"   height="56"/>
  </g>
  <!-- TREEQUEST text in pixel block letters (8x14 grid per letter, 4px modules) -->
  <g fill="#FFFCFC">
    <!-- T -->
    <rect x="16" y="34" width="20" height="4"/>
    <rect x="22" y="38" width="8"  height="24"/>
    <!-- R -->
    <rect x="40" y="34" width="16" height="4"/>
    <rect x="40" y="38" width="4"  height="24"/>
    <rect x="52" y="38" width="4"  height="10"/>
    <rect x="40" y="48" width="16" height="4"/>
    <rect x="48" y="52" width="4"  height="10"/>
    <rect x="52" y="58" width="4"  height="4"/>
    <!-- E -->
    <rect x="60" y="34" width="16" height="4"/>
    <rect x="60" y="38" width="4"  height="24"/>
    <rect x="60" y="46" width="12" height="4"/>
    <rect x="60" y="58" width="16" height="4"/>
    <!-- E -->
    <rect x="80" y="34" width="16" height="4"/>
    <rect x="80" y="38" width="4"  height="24"/>
    <rect x="80" y="46" width="12" height="4"/>
    <rect x="80" y="58" width="16" height="4"/>
    <!-- Q -->
    <rect x="104" y="34" width="16" height="4"/>
    <rect x="104" y="38" width="4"  height="20"/>
    <rect x="116" y="38" width="4"  height="20"/>
    <rect x="104" y="58" width="16" height="4"/>
    <rect x="112" y="54" width="4"  height="4"/>
    <rect x="118" y="62" width="6"  height="4"/>
    <!-- U -->
    <rect x="128" y="34" width="4"  height="24"/>
    <rect x="140" y="34" width="4"  height="24"/>
    <rect x="128" y="58" width="16" height="4"/>
    <!-- E -->
    <rect x="148" y="34" width="16" height="4"/>
    <rect x="148" y="38" width="4"  height="24"/>
    <rect x="148" y="46" width="12" height="4"/>
    <rect x="148" y="58" width="16" height="4"/>
    <!-- S -->
    <rect x="168" y="34" width="16" height="4"/>
    <rect x="168" y="38" width="4"  height="10"/>
    <rect x="168" y="46" width="16" height="4"/>
    <rect x="180" y="50" width="4"  height="8"/>
    <rect x="168" y="58" width="16" height="4"/>
    <!-- T -->
    <rect x="188" y="34" width="20" height="4"/>
    <rect x="194" y="38" width="8"  height="24"/>
  </g>
  <!-- Tree icon on right side -->
  <g fill="#00A800">
    <rect x="240" y="30" width="40" height="28"/>
    <rect x="248" y="26" width="24" height="4"/>
    <rect x="232" y="38" width="8"  height="16"/>
    <rect x="280" y="38" width="8"  height="16"/>
  </g>
  <g fill="#A05A2C">
    <rect x="252" y="58" width="16" height="14"/>
  </g>
  <g fill="#000000">
    <rect x="240" y="26" width="40" height="2"/>
    <rect x="240" y="58" width="40" height="2"/>
    <rect x="252" y="72" width="16" height="2"/>
  </g>
</svg>
