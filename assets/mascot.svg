<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- Pixel mascot: simple sapling-themed character -->
  <!-- Hair / leaves -->
  <g fill="#00A800">
    <rect x="10" y="2"  width="12" height="2"/>
    <rect x="8"  y="4"  width="16" height="2"/>
    <rect x="6"  y="6"  width="20" height="2"/>
    <rect x="6"  y="8"  width="4"  height="2"/>
    <rect x="22" y="8"  width="4"  height="2"/>
  </g>
  <!-- Outline darker leaves -->
  <g fill="#007800">
    <rect x="12" y="0" width="8"  height="2"/>
    <rect x="4"  y="6" width="2"  height="4"/>
    <rect x="26" y="6" width="2"  height="4"/>
  </g>
  <!-- Face -->
  <g fill="#FCE0A8">
    <rect x="10" y="10" width="12" height="10"/>
  </g>
  <!-- Eyes -->
  <g fill="#000000">
    <rect x="12" y="14" width="2" height="2"/>
    <rect x="18" y="14" width="2" height="2"/>
    <rect x="14" y="18" width="4" height="1"/>
  </g>
  <!-- Body / shirt -->
  <g fill="#E03C28">
    <rect x="8"  y="20" width="16" height="12"/>
    <rect x="10" y="32" width="12" height="2"/>
  </g>
  <!-- Shirt highlight -->
  <g fill="#FCBC3C">
    <rect x="14" y="22" width="4" height="2"/>
  </g>
  <!-- Arms -->
  <g fill="#FCE0A8">
    <rect x="4"  y="22" width="4" height="8"/>
    <rect x="24" y="22" width="4" height="8"/>
  </g>
  <!-- Legs (running pose A) -->
  <g class="pose-a" fill="#000080">
    <rect x="10" y="34" width="4" height="10"/>
    <rect x="18" y="34" width="4" height="10"/>
  </g>
  <!-- Shoes -->
  <g fill="#000000">
    <rect x="8"  y="44" width="8" height="4"/>
    <rect x="16" y="44" width="8" height="4"/>
  </g>
  <!-- Outline -->
  <g fill="#000000">
    <rect x="10" y="10" width="12" height="1"/>
    <rect x="10" y="19" width="12" height="1"/>
    <rect x="9"  y="11" width="1"  height="9"/>
    <rect x="22" y="11" width="1"  height="9"/>
  </g>
</svg>
