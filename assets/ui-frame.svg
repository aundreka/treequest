<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Paper fill -->
  <rect x="0" y="0" width="48" height="48" fill="#FCE0A8"/>
  <!-- Outer black border (4px) -->
  <g fill="#000000">
    <rect x="0"  y="0"  width="48" height="4"/>
    <rect x="0"  y="44" width="48" height="4"/>
    <rect x="0"  y="0"  width="4"  height="48"/>
    <rect x="44" y="0"  width="4"  height="48"/>
  </g>
  <!-- Inner white highlight on top/left -->
  <g fill="#FFFCFC">
    <rect x="4"  y="4"  width="40" height="2"/>
    <rect x="4"  y="4"  width="2"  height="40"/>
  </g>
  <!-- Inner dark shadow on bottom/right -->
  <g fill="#A07A48">
    <rect x="4"  y="42" width="40" height="2"/>
    <rect x="42" y="4"  width="2"  height="40"/>
  </g>
</svg>
